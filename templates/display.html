<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FacePlay Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000; color: #fff;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  .bg-art {
    position: fixed; inset: -40px;
    background-size: cover; background-position: center;
    filter: blur(60px) brightness(0.35) saturate(1.8);
    transition: background-image 1s ease;
    z-index: 0;
  }
  .idle { text-align: center; opacity: 0.3; z-index: 1; display: flex; flex-direction: column; align-items: center; }
  .idle .icon { font-size: 5rem; margin-bottom: 16px; }
  .idle p { font-size: 1.5rem; font-weight: 300; letter-spacing: 2px; }
  .detection { display: none; flex-direction: column; align-items: center; text-align: center; animation: fadeIn 0.6s ease; z-index: 1; }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  .cards-row { display: flex; align-items: center; gap: 48px; margin-bottom: 36px; }
  .photo-ring { width: 200px; height: 200px; border-radius: 50%; border: 5px solid #1db954; overflow: hidden; flex-shrink: 0; box-shadow: 0 0 60px rgba(29,185,84,0.5); }
  .photo-ring img { width: 100%; height: 100%; object-fit: cover; }
  .photo-ring .initials { width: 100%; height: 100%; background: #1db954; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; font-weight: 800; color: #000; }
  .album-card { width: 200px; height: 200px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6); flex-shrink: 0; background: #1e1e2e; display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; }
  .album-card img { width: 100%; height: 100%; object-fit: cover; }
  .album-card .no-album { font-size: 3rem; opacity: 0.3; }
  .person-name { font-size: 3.8rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 16px; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }
  .now-playing { display: flex; align-items: center; gap: 12px; background: #1db954; color: #000; padding: 12px 28px; border-radius: 100px; font-size: 1.15rem; font-weight: 700; box-shadow: 0 4px 20px rgba(29,185,84,0.4); }
  .now-playing .note { font-size: 1.3rem; animation: bounce 0.8s infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-4px)} }
  .log { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1; }
  .log-chip { background: rgba(30,30,46,0.8); padding: 8px 16px; border-radius: 100px; font-size: 0.8rem; color: #888; backdrop-filter: blur(10px); }
  .log-chip span { color: #fff; font-weight: 600; }
  .logo { position: fixed; top: 24px; left: 32px; font-size: 1.4rem; font-weight: 800; opacity: 0.5; z-index: 1; }
  .logo em { color: #1db954; font-style: normal; }
</style>
</head>
<body>
<div class="bg-art" id="bg-art"></div>
<div class="logo">Face<em>Play</em></div>
<div class="idle" id="idle">
  <div class="icon">👀</div>
  <p>WATCHING FOR FACES</p>
</div>
<div class="detection" id="detection">
  <div class="cards-row">
    <div class="photo-ring" id="photo-ring"><div class="initials" id="initials">?</div></div>
    <div class="album-card" id="album-card"><div class="no-album">🎵</div></div>
  </div>
  <div class="person-name" id="person-name"></div>
  <div class="now-playing"><span class="note">♪</span><span id="song-name">Playing...</span></div>
</div>
<div class="log" id="log"></div>
<script>
let lastPerson = null;
async function getAlbumArt() {
  try { const res = await fetch('/api/now_playing'); const data = await res.json(); return data.album_art || null; } catch { return null; }
}
async function poll() {
  try {
    const res = await fetch('/api/state');
    const s = await res.json();
    const active = s.now < s.display_until;
    document.getElementById('idle').style.display = active ? 'none' : 'flex';
    document.getElementById('detection').style.display = active ? 'flex' : 'none';
    if (!active) { lastPerson = null; document.getElementById('bg-art').style.backgroundImage = ''; return; }
    if (s.current_person !== lastPerson) {
      lastPerson = s.current_person;
      document.getElementById('person-name').textContent = s.current_person;
      document.getElementById('song-name').textContent = s.current_song;
      const ring = document.getElementById('photo-ring');
      const name = s.current_person;
      if (name && name !== '???') {
        const slug = name.toLowerCase().replace(/ /g, '_');
        const img = new Image();
        img.onload = () => { ring.innerHTML = `<img src="/static/photos/${slug}.jpg">`; };
        img.onerror = () => { ring.innerHTML = `<div class="initials">${name[0].toUpperCase()}</div>`; };
        img.src = `/static/photos/${slug}.jpg`;
      } else { ring.innerHTML = `<div class="initials">?</div>`; }
      const art = await getAlbumArt();
      const albumCard = document.getElementById('album-card');
      const bg = document.getElementById('bg-art');
      if (art) { albumCard.innerHTML = `<img src="${art}" alt="album art">`; bg.style.backgroundImage = `url(${art})`; }
      else { albumCard.innerHTML = `<div class="no-album">🎵</div>`; bg.style.backgroundImage = ''; }
    }
    document.getElementById('log').innerHTML = s.last_seen.slice(0, 5).map(e =>
      `<div class="log-chip"><span>${e.name}</span> @ ${e.time}</div>`).join('');
  } catch(e) {}
}
setInterval(poll, 800);
poll();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FacePlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid #1e1e2e;
    background: #0d0d1a;
  }
  .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -1px; }
  .logo span { color: #1db954; }
  .nav-btns { display: flex; gap: 12px; }
  .btn {
    padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary { background: #1db954; color: #000; }
  .btn-primary:hover { background: #1ed760; }
  .btn-secondary { background: #1e1e2e; color: #fff; }
  .btn-secondary:hover { background: #2a2a3e; }

  .container { max-width: 1200px; margin: 0 auto; padding: 40px; }

  .status-bar {
    background: #1e1e2e; border-radius: 16px; padding: 24px 32px;
    margin-bottom: 32px; display: flex; align-items: center; gap: 24px;
  }
  .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #1db954; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { flex: 1; }
  .status-text h2 { font-size: 1.1rem; color: #888; font-weight: 400; }
  .status-text .current { font-size: 1.4rem; font-weight: 700; color: #fff; margin-top: 4px; }
  .status-text .song { color: #1db954; font-size: 0.95rem; margin-top: 2px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  .card { background: #1e1e2e; border-radius: 16px; padding: 24px; }
  .card h3 { font-size: 1rem; color: #888; font-weight: 600; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }

  .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }
  .person-card {
    background: #2a2a3e; border-radius: 12px; padding: 16px;
    text-align: center; transition: all 0.2s; cursor: default;
  }
  .person-card:hover { background: #333350; transform: translateY(-2px); }
  .person-card img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #1db954; }
  .person-card .no-photo { width: 64px; height: 64px; border-radius: 50%; background: #1db954; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; color: #000; margin: 0 auto 8px; }
  .person-card .pname { font-size: 0.85rem; font-weight: 600; }
  .person-card .psong { font-size: 0.75rem; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .log-list { list-style: none; }
  .log-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #2a2a3e; }
  .log-item:last-child { border-bottom: none; }
  .log-item img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
  .log-item .no-photo-sm { width: 36px; height: 36px; border-radius: 50%; background: #1db954; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: #000; flex-shrink: 0; }
  .log-name { font-weight: 600; font-size: 0.9rem; }
  .log-time { color: #888; font-size: 0.8rem; margin-top: 2px; }
  .log-meta { flex: 1; }

  .qr-section { text-align: center; }
  .qr-section img { border-radius: 12px; margin: 16px 0; }
  .qr-url { color: #1db954; font-size: 0.85rem; word-break: break-all; }

  .empty { color: #555; text-align: center; padding: 20px; }
  .person-card { cursor: pointer; position: relative; }
  .person-card:hover .edit-hint { opacity: 1; }
  .edit-hint { position: absolute; top: 8px; right: 8px; background: #1db954; color: #000; font-size: 0.65rem; font-weight: 700; padding: 3px 7px; border-radius: 6px; opacity: 0; transition: opacity 0.2s; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #1e1e2e; border-radius: 20px; padding: 32px; width: 100%; max-width: 460px; position: relative; }
  .modal h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
  .modal .sub { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
  .modal label { display: block; font-size: 0.8rem; color: #888; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .modal input[type=text] { width: 100%; background: #2a2a3e; border: 1px solid #333; color: #fff; padding: 11px 14px; border-radius: 10px; font-size: 0.9rem; outline: none; }
  .modal input[type=text]:focus { border-color: #1db954; }
  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-row input { flex: 1; }
  .btn-sm { padding: 11px 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 700; }
  .btn-sm-green { background: #1db954; color: #000; }
  .btn-sm-red { background: #3a1a1a; color: #e05555; }
  .btn-sm-gray { background: #2a2a3e; color: #888; }
  .modal-results { margin-bottom: 16px; max-height: 220px; overflow-y: auto; }
  .modal-track { display: flex; align-items: center; gap: 10px; padding: 10px; background: #2a2a3e; border-radius: 10px; margin-bottom: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .modal-track:hover { border-color: #555; }
  .modal-track.selected { border-color: #1db954; background: #1a3a2a; }
  .modal-track img { width: 40px; height: 40px; border-radius: 6px; }
  .modal-track .tname { font-size: 0.85rem; font-weight: 600; }
  .modal-track .tartist { font-size: 0.75rem; color: #888; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #888; font-size: 1.3rem; cursor: pointer; }
  .current-song-badge { background: #1a3a2a; color: #1db954; padding: 8px 12px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">Face<span>Play</span></div>
  <div class="nav-btns">
    <button class="btn btn-secondary" onclick="window.open('/display','_blank')">📺 Display</button>
    <button class="btn btn-primary" onclick="window.location='/register'">+ Add Person</button>
  </div>
</header>

<div class="container">

  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-text">
      <h2>Currently Detected</h2>
      <div class="current" id="current-person">Watching...</div>
      <div class="song" id="current-song"></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Registered People</h3>
      <div class="people-grid" id="people-grid">
        <div class="empty">Loading...</div>
      </div>
    </div>

    <div class="card">
      <h3>Recent Activity</h3>
      <ul class="log-list" id="log-list">
        <div class="empty">No activity yet</div>
      </ul>
    </div>

    <div class="card">
      <h3>Register via QR Code</h3>
      <div class="qr-section">
        <p style="color:#888;font-size:0.9rem">Scan with phone to register a new face</p>
        <div id="qr-container"><div class="empty">Loading QR...</div></div>
        <div class="qr-url" id="qr-url"></div>
      </div>
    </div>

    <div class="card">
      <h3>Spotify Devices</h3>
      <ul class="log-list" id="devices-list">
        <div class="empty">Loading...</div>
      </ul>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-name"></h2>
    <p class="sub">Edit song assignment</p>
    <div class="current-song-badge" id="modal-current-song"></div>
    <label>Search for a new song</label>
    <div class="search-row">
      <input type="text" id="modal-search" placeholder="Song or artist..." onkeydown="if(event.key==='Enter')modalSearch()">
      <button class="btn-sm btn-sm-green" onclick="modalSearch()">Search</button>
    </div>
    <div class="modal-results" id="modal-results"></div>
    <input type="hidden" id="modal-uri">
    <input type="hidden" id="modal-song-name">
    <div class="modal-actions">
      <button class="btn-sm btn-sm-green" style="flex:1;padding:12px" onclick="saveEdit()">Save</button>
      <button class="btn-sm btn-sm-red" onclick="deletePerson()">🗑 Delete</button>
      <button class="btn-sm btn-sm-gray" onclick="closeModal()">Cancel</button>
    </div>
    <div id="modal-msg" style="margin-top:12px;font-size:0.85rem;color:#1db954;display:none"></div>
  </div>
</div>

<script>
async function loadPeople() {
  const res = await fetch('/api/people');
  const people = await res.json();
  const grid = document.getElementById('people-grid');
  if (!people.length) { grid.innerHTML = '<div class="empty">No one registered yet</div>'; return; }
  grid.innerHTML = people.map(p => `
    <div class="person-card" onclick="openModal('${p.name}', '${(p.song_name||'').replace(/'/g,"\\'")}')">
      <div class="edit-hint">EDIT</div>
      ${p.photo ? `<img src="${p.photo}" alt="${p.name}">` : `<div class="no-photo">${p.name[0].toUpperCase()}</div>`}
      <div class="pname">${p.name}</div>
      <div class="psong">${p.song_name || 'No song'}</div>
    </div>
  `).join('');
}

let editingName = '';

function openModal(name, songName) {
  editingName = name;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-current-song').textContent = songName ? ('♪ ' + songName) : 'No song assigned';
  document.getElementById('modal-uri').value = '';
  document.getElementById('modal-song-name').value = '';
  document.getElementById('modal-results').innerHTML = '';
  document.getElementById('modal-search').value = '';
  document.getElementById('modal-msg').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

async function modalSearch() {
  const q = document.getElementById('modal-search').value.trim();
  if (!q) return;
  const res = await fetch(`/api/search_song?q=${encodeURIComponent(q)}`);
  const tracks = await res.json();
  const c = document.getElementById('modal-results');
  if (!tracks.length) { c.innerHTML = '<p style="color:#888;font-size:0.82rem;padding:6px">No results</p>'; return; }
  c.innerHTML = tracks.map(t => `
    <div class="modal-track" onclick="selectModalTrack('${t.uri}','${(t.name+' - '+t.artist).replace(/'/g,"\\'")}',this)">
      <img src="${t.album_art}">
      <div>
        <div class="tname">${t.name}</div>
        <div class="tartist">${t.artist}</div>
      </div>
    </div>
  `).join('');
}

function selectModalTrack(uri, name, el) {
  document.querySelectorAll('.modal-track').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('modal-uri').value = uri;
  document.getElementById('modal-song-name').value = name;
}

async function saveEdit() {
  const uri = document.getElementById('modal-uri').value;
  const songName = document.getElementById('modal-song-name').value;
  const msg = document.getElementById('modal-msg');
  if (!uri) { msg.style.display='block'; msg.style.color='#e05555'; msg.textContent='Select a song first.'; return; }
  const res = await fetch('/api/update_song', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: editingName, song_uri: uri, song_name: songName })
  });
  const data = await res.json();
  if (data.success) {
    msg.style.display='block'; msg.style.color='#1db954'; msg.textContent='✓ Saved!';
    setTimeout(() => { closeModal(); loadPeople(); }, 800);
  } else {
    msg.style.display='block'; msg.style.color='#e05555'; msg.textContent = data.error || 'Failed';
  }
}

async function deletePerson() {
  if (!confirm(`Delete ${editingName}?`)) return;
  const res = await fetch(`/api/delete/${encodeURIComponent(editingName)}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) { closeModal(); loadPeople(); }
}


async function loadState() {
  const res = await fetch('/api/state');
  const s = await res.json();
  const active = s.now < s.display_until;

  document.getElementById('current-person').textContent = active ? s.current_person : 'Watching...';
  document.getElementById('current-song').textContent = active ? ('♪ ' + s.current_song) : '';

  const log = document.getElementById('log-list');
  if (!s.last_seen.length) { log.innerHTML = '<div class="empty">No activity yet</div>'; return; }
  log.innerHTML = s.last_seen.map(e => `
    <li class="log-item">
      ${e.photo ? `<img src="${e.photo}" alt="${e.name}">` : `<div class="no-photo-sm">${e.name[0].toUpperCase()}</div>`}
      <div class="log-meta">
        <div class="log-name">${e.name}</div>
        <div class="log-time">${e.time}</div>
      </div>
    </li>
  `).join('');
}

async function loadQR() {
  const res = await fetch('/api/register/qr');
  const data = await res.json();
  document.getElementById('qr-container').innerHTML = `<img src="data:image/png;base64,${data.qr}" width="160">`;
  document.getElementById('qr-url').textContent = data.url;
}

async function loadDevices() {
  const res = await fetch('/api/devices');
  const devices = await res.json();
  const list = document.getElementById('devices-list');
  if (!devices.length) { list.innerHTML = '<div class="empty">No Spotify devices found. Open Spotify on a device.</div>'; return; }
  list.innerHTML = devices.map(d => `
    <li class="log-item">
      <div class="no-photo-sm">🎵</div>
      <div class="log-meta">
        <div class="log-name">${d.name}</div>
        <div class="log-time">${d.type} • ${d.is_active ? '▶ Active' : 'Inactive'}</div>
      </div>
    </li>
  `).join('');
}

loadPeople();
loadQR();
loadDevices();
setInterval(loadState, 1000);
setInterval(loadPeople, 5000);
setInterval(loadDevices, 10000);
</script>
</body>
</html>
